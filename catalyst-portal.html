<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Catalyst — NPS Koramangala | Student Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, getDocs, query, orderBy, onSnapshot, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "AIzaSyAlJ-_DTU0SuDEkqDTrrdyGGMM4teBoXR0",
  authDomain:        "catalyst-npskrm.firebaseapp.com",
  projectId:         "catalyst-npskrm",
  storageBucket:     "catalyst-npskrm.firebasestorage.app",
  messagingSenderId: "27518394660",
  appId:             "1:27518394660:web:3a3ac9b8f8e58bcdff13b1"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
window.__db = db;
window.__fbReady = true;
window.__firestore = { collection, doc, setDoc, getDocs, query, orderBy, onSnapshot, serverTimestamp };
window.dispatchEvent(new Event('firebase-ready'));
</script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:        #0e1117;
  --paper:      #f5f0e8;
  --cream:      #ede8dc;
  --gold:       #b8860b;
  --gold-light: #d4a017;
  --rust:       #8b3a1a;
  --slate:      #3d4a5c;
  --muted:      #7a7265;
  --rule:       rgba(14,17,23,0.12);
  --green:      #2d6a4f;
  --blue:       #2c5f8a;
  --surface:    #ffffff;
  --surface2:   #f0efe9;
  --success-bg: #eaf4e8;
  --success-fg: #2a7a28;
  --p1: #2c5f8a;
  --p2: #2d6a4f;
  --p3: #c47c2a;
  --p4: #8b3a1a;
  --p5: #b8860b;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.7;
}

.screen { display: none; }
.screen.active { display: block; }
#login-screen.active { display: flex; }

/* ── TOPBAR ── */
.topbar {
  background: var(--ink); padding: 0 1.5rem; height: 52px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 10;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.topbar-brand { display: flex; align-items: center; gap: 10px; }
.topbar-brand .logo {
  width: 28px; height: 28px; border-radius: 5px;
  background: var(--gold); display: flex; align-items: center; justify-content: center;
}
.topbar-brand .logo svg { width: 15px; height: 15px; color: var(--ink); }
.topbar-brand span { font-size: 14px; font-weight: 500; color: var(--paper); }
.topbar-brand small { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; color: rgba(245,240,232,0.4); margin-left: 4px; }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: rgba(184,134,11,0.2); color: var(--gold);
  font-family: 'DM Mono', monospace; font-size: 11px;
  display: flex; align-items: center; justify-content: center;
}
.user-name { font-size: 13px; font-weight: 500; color: var(--paper); }
.btn-ghost {
  font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em;
  padding: 5px 12px; border: 1px solid rgba(255,255,255,0.15);
  border-radius: 4px; background: transparent; cursor: pointer;
  color: rgba(245,240,232,0.6); transition: all .15s;
}
.btn-ghost:hover { border-color: rgba(255,255,255,0.4); color: var(--paper); }

/* ── LOGIN ── */
#login-screen {
  flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; padding: 2rem 1rem; background: var(--ink);
}
.login-wrap { width: 100%; max-width: 380px; }
.login-hero { text-align: center; margin-bottom: 2rem; }
.login-badge {
  display: inline-block; font-family: 'DM Mono', monospace;
  font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase;
  color: var(--gold); border: 1px solid rgba(184,134,11,0.35); padding: 5px 14px; margin-bottom: 18px;
}
.login-hero h1 { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; color: var(--paper); margin-bottom: 6px; }
.login-hero h1 span { color: var(--gold-light); }
.login-hero p { font-size: 13px; color: rgba(245,240,232,0.4); }

.role-tabs {
  display: flex; gap: 2px; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1); padding: 3px; margin-bottom: 1.25rem; border-radius: 6px;
}
.role-tab {
  flex: 1; padding: 8px 0; font-family: 'DM Mono', monospace;
  font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
  border: none; background: transparent; color: rgba(245,240,232,0.4);
  border-radius: 4px; cursor: pointer; transition: all .15s;
}
.role-tab.active { background: var(--gold); color: var(--ink); font-weight: 500; }

.card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 1.5rem; }

.field { margin-bottom: 14px; }
.field label {
  display: block; font-family: 'DM Mono', monospace;
  font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase;
  color: rgba(245,240,232,0.4); margin-bottom: 6px;
}
.field input, .field select {
  width: 100%; padding: 10px 13px; font-size: 14px; font-family: 'DM Sans', sans-serif;
  border: 1px solid rgba(255,255,255,0.12); border-radius: 5px;
  background: rgba(255,255,255,0.06); color: var(--paper); outline: none; transition: border-color .15s;
  appearance: none; -webkit-appearance: none;
}
.field input::placeholder { color: rgba(245,240,232,0.25); }
.field input:focus, .field select:focus { border-color: var(--gold); }
.field select option { background: #1a1916; color: var(--paper); }

.hint { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; color: rgba(245,240,232,0.25); margin-bottom: 14px; }
.hint strong { color: rgba(245,240,232,0.5); }

.btn-primary {
  width: 100%; padding: 12px; background: var(--gold); color: var(--ink);
  border: none; border-radius: 5px; font-family: 'DM Mono', monospace;
  font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
  cursor: pointer; margin-top: 4px; transition: background .15s; font-weight: 500;
}
.btn-primary:hover { background: var(--gold-light); }
.btn-primary:disabled { opacity: .4; cursor: not-allowed; }

/* ── STUDENT PORTAL ── */
.portal-body { max-width: 760px; margin: 0 auto; padding: 2rem 1.5rem; }

.phase-nav { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 1.75rem; scrollbar-width: none; }
.phase-nav::-webkit-scrollbar { display: none; }

.phase-pill {
  flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-start; gap: 2px;
  padding: 10px 16px; border: 1px solid var(--rule); border-radius: 6px;
  background: var(--surface); cursor: pointer; font-family: inherit;
  transition: all .15s; min-width: 120px; position: relative; overflow: hidden;
}
.phase-pill::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; opacity: 0; transition: opacity .15s; }
.phase-pill:hover { border-color: rgba(0,0,0,0.22); }
.phase-pill.active { border-color: transparent; }
.phase-pill.active::before { opacity: 1; }

.pill-roman { font-family: 'Playfair Display', serif; font-size: 11px; font-weight: 700; color: var(--muted); }
.phase-pill.active .pill-roman { color: rgba(255,255,255,0.7); }
.pill-name { font-size: 12px; font-weight: 500; color: var(--ink); }
.phase-pill.active .pill-name { color: white; }
.pill-weeks { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.08em; color: var(--muted); }
.phase-pill.active .pill-weeks { color: rgba(255,255,255,0.5); }
.pill-status { font-size: 11px; margin-top: 1px; color: var(--success-fg); }

.phase-pill[data-p="1"]::before, .phase-pill[data-p="1"].active { background: var(--p1); border-color: var(--p1); }
.phase-pill[data-p="2"]::before, .phase-pill[data-p="2"].active { background: var(--p2); border-color: var(--p2); }
.phase-pill[data-p="3"]::before, .phase-pill[data-p="3"].active { background: var(--p3); border-color: var(--p3); }
.phase-pill[data-p="4"]::before, .phase-pill[data-p="4"].active { background: var(--p4); border-color: var(--p4); }
.phase-pill[data-p="5"]::before, .phase-pill[data-p="5"].active { background: var(--p5); border-color: var(--p5); }
.phase-pill[data-p="1"]::before { background: var(--p1); }
.phase-pill[data-p="2"]::before { background: var(--p2); }
.phase-pill[data-p="3"]::before { background: var(--p3); }
.phase-pill[data-p="4"]::before { background: var(--p4); }
.phase-pill[data-p="5"]::before { background: var(--p5); }

/* Form card */
.form-card { background: var(--surface); border: 1px solid var(--rule); border-radius: 10px; overflow: hidden; }
.form-card-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--rule); display: flex; align-items: flex-start; gap: 14px; }
.phase-badge {
  width: 42px; height: 42px; border-radius: 6px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; color: white;
}
.form-card-header-text h3 { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 600; margin-bottom: 3px; }
.weeks-tag { font-family: 'DM Mono', monospace; font-size: 9.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
.deliverable-bar {
  padding: 12px 1.5rem; border-bottom: 1px solid var(--rule);
  font-size: 13px; color: var(--slate); border-left-width: 3px; border-left-style: solid;
}
.deliverable-bar strong { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; margin-right: 6px; }
.form-body { padding: 1.5rem; display: flex; flex-direction: column; gap: 16px; }
.form-body .field { margin-bottom: 0; }
.form-body .field label { color: var(--muted); }
.form-body input[type="text"], .form-body select, .form-body textarea {
  width: 100%; padding: 10px 13px; font-size: 14px; font-family: 'DM Sans', sans-serif;
  border: 1px solid var(--rule); border-radius: 5px;
  background: var(--paper); color: var(--ink); outline: none; transition: all .15s;
  appearance: none; -webkit-appearance: none;
}
.form-body input:focus, .form-body select:focus, .form-body textarea:focus { border-color: var(--gold); background: var(--surface); }
.form-body textarea { resize: vertical; min-height: 110px; line-height: 1.65; }

.file-drop {
  border: 1.5px dashed rgba(14,17,23,0.18); border-radius: 6px; padding: 1.25rem;
  text-align: center; cursor: pointer; background: var(--paper); transition: all .15s; position: relative;
}
.file-drop:hover { border-color: var(--gold); background: #fdfaf4; }
.file-drop input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.file-drop-icon { font-size: 1.3rem; margin-bottom: 5px; }
.file-drop-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
.file-drop-hint { font-size: 12px; color: var(--muted); margin-top: 3px; }
.file-chosen { font-size: 13px; color: var(--success-fg); margin-top: 8px; display: none; }
.file-chosen.show { display: block; }

.form-footer {
  padding: 1.25rem 1.5rem; background: var(--paper); border-top: 1px solid var(--rule);
  display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
}
.btn-submit {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 11px 28px; background: var(--ink); color: var(--paper);
  border: none; border-radius: 5px; font-family: 'DM Mono', monospace;
  font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
  cursor: pointer; transition: all .15s;
}
.btn-submit:hover { background: var(--gold); color: var(--ink); }
.btn-submit:disabled { opacity: .4; cursor: not-allowed; }
.submit-note { font-size: 12px; color: var(--muted); font-style: italic; }

/* Submitted view */
.submitted-view { background: var(--success-bg); border: 1px solid #b2deb0; border-radius: 10px; padding: 1.5rem; display: none; }
.submitted-view.show { display: block; }
.submitted-header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.25rem; }
.check-circle {
  width: 34px; height: 34px; border-radius: 50%; background: var(--success-fg);
  color: white; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0;
}
.submitted-header h3 { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 600; color: var(--success-fg); }
.submitted-header p { font-size: 12px; color: var(--muted); }
.sub-field { margin-bottom: 14px; }
.sub-field-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
.sub-field-value { font-size: 14px; color: var(--slate); line-height: 1.65; white-space: pre-wrap; }
.sub-file { font-size: 13px; color: var(--blue); margin-top: 4px; }
.btn-edit { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--blue); background: none; border: none; cursor: pointer; padding: 0; margin-top: 12px; }

/* ── TEACHER DASHBOARD ── */
.dash-body { max-width: 820px; margin: 0 auto; padding: 2rem 1.5rem; }
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.75rem; }
.stat { background: var(--surface); border: 1px solid var(--rule); border-radius: 8px; padding: 14px 16px; }
.stat .lbl { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
.stat .val { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; }

.filter-bar { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
.filter-bar select, .filter-bar input {
  padding: 8px 12px; font-size: 13px; font-family: 'DM Sans', sans-serif;
  border: 1px solid var(--rule); border-radius: 6px;
  background: var(--surface); color: var(--ink); outline: none;
  appearance: none; -webkit-appearance: none;
}
.filter-bar select { min-width: 150px; }
.filter-bar input { flex: 1; min-width: 160px; }

.subs-list { display: flex; flex-direction: column; gap: 8px; }
.sub-row {
  background: var(--surface); border: 1px solid var(--rule); border-radius: 8px;
  padding: 1rem 1.25rem 1rem 1.5rem; cursor: pointer; transition: border-color .15s;
  position: relative; overflow: hidden;
}
.sub-row::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
.sub-row[data-p="1"]::before { background: var(--p1); }
.sub-row[data-p="2"]::before { background: var(--p2); }
.sub-row[data-p="3"]::before { background: var(--p3); }
.sub-row[data-p="4"]::before { background: var(--p4); }
.sub-row[data-p="5"]::before { background: var(--p5); }
.sub-row:hover { border-color: rgba(0,0,0,0.22); }
.sub-row-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 4px; }
.sub-row-name { font-size: 14px; font-weight: 500; }
.sub-row-phase { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.08em; color: var(--muted); white-space: nowrap; }
.sub-row-preview { font-size: 13px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sub-row-tags { display: flex; gap: 6px; margin-top: 6px; align-items: center; flex-wrap: wrap; }
.tag { font-family: 'DM Mono', monospace; font-size: 10px; padding: 2px 9px; border-radius: 10px; }
.tag-file { background: #eaf1fb; color: var(--blue); }
.tag-text { background: var(--paper); color: var(--muted); border: 1px solid var(--rule); }
.sub-ts { font-size: 11px; color: var(--muted); margin-left: auto; }
.empty { text-align: center; padding: 3rem; font-size: 14px; color: var(--muted); }

/* ── MODAL ── */
.modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(14,17,23,0.6); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
.modal-backdrop.open { display: flex; }
.modal-box { background: var(--surface); border-radius: 10px; padding: 1.5rem; width: 100%; max-width: 560px; max-height: 85vh; overflow-y: auto; border: 1px solid var(--rule); }
.modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.25rem; }
.modal-phase-tag { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; padding: 3px 10px; border-radius: 10px; color: white; display: inline-block; margin-bottom: 6px; }
.modal-header h3 { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 600; }
.modal-header p  { font-size: 13px; color: var(--muted); margin-top: 2px; }
.modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--muted); line-height: 1; flex-shrink: 0; }
.modal-section { margin-bottom: 1rem; }
.modal-section-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
.modal-section-value { font-size: 14px; color: var(--ink); line-height: 1.7; white-space: pre-wrap; }
.modal-file { font-size: 13px; color: var(--blue); margin-top: 6px; }

/* ── TOAST / LOADING ── */
.toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--ink); color: var(--paper); padding: 10px 22px; border-radius: 6px; font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.1em; z-index: 999; transition: transform .3s ease; white-space: nowrap; pointer-events: none; border: 1px solid rgba(255,255,255,0.1); }
.toast.show { transform: translateX(-50%) translateY(0); }
.loading-overlay { display: none; position: fixed; inset: 0; background: var(--ink); z-index: 200; align-items: center; justify-content: center; flex-direction: column; gap: 14px; }
.loading-overlay.show { display: flex; }
.spinner { width: 28px; height: 28px; border: 2px solid rgba(255,255,255,0.15); border-top-color: var(--gold); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-overlay p { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.15em; color: rgba(245,240,232,0.4); text-transform: uppercase; }

@media (max-width: 600px) {
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .topbar-brand small { display: none; }
  .phase-pill { min-width: 100px; }
}
</style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay"><div class="spinner"></div><p id="loading-msg">Connecting…</p></div>
<div class="toast" id="toast"></div>

<!-- ═══════════ LOGIN ═══════════ -->
<div id="login-screen" class="screen active">
  <div class="login-wrap">
    <div class="login-hero">
      <div class="login-badge">NPS Koramangala · Catalyst 2026</div>
      <h1><span>Catalyst</span> Research Portal</h1>
      <p>Young Investigators Journal — Student Submission System</p>
    </div>
    <div class="role-tabs">
      <button class="role-tab active" onclick="setRole('student',this)">Student</button>
      <button class="role-tab" onclick="setRole('teacher',this)">Teacher</button>
    </div>
    <div class="card">
      <div id="pane-student">
        <div class="field"><label>Full Name</label><input type="text" id="s-name" placeholder="e.g. Riya Sharma" /></div>
        <div class="field">
          <label>Class</label>
          <select id="s-class">
            <option value="">Select your class</option>
            <option>Grade 6A</option><option>Grade 6B</option>
            <option>Grade 7A</option><option>Grade 7B</option>
            <option>Grade 8A</option><option>Grade 8B</option>
          </select>
        </div>
        <button class="btn-primary" onclick="studentLogin()">Enter Portal →</button>
      </div>
      <div id="pane-teacher" style="display:none">
        <div class="field"><label>Teacher Access Code</label><input type="password" id="t-code" placeholder="Enter code" onkeydown="if(event.key==='Enter')teacherLogin()" /></div>
        <div class="hint">Demo code: <strong>catalyst2025</strong></div>
        <button class="btn-primary" onclick="teacherLogin()">Open Dashboard →</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════ STUDENT PORTAL ═══════════ -->
<div id="student-screen" class="screen">
  <nav class="topbar">
    <div class="topbar-brand">
      <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
      <span>Catalyst</span><small>NPS Koramangala</small>
    </div>
    <div class="topbar-right">
      <div class="avatar" id="s-avatar">RS</div>
      <span class="user-name" id="s-display"></span>
      <button class="btn-ghost" onclick="logout()">Sign out</button>
    </div>
  </nav>
  <div class="portal-body">
    <div class="phase-nav" id="phase-nav"></div>
    <div id="phase-content"></div>
  </div>
</div>

<!-- ═══════════ TEACHER DASHBOARD ═══════════ -->
<div id="teacher-screen" class="screen">
  <nav class="topbar">
    <div class="topbar-brand">
      <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
      <span>Catalyst</span><small>Teacher Dashboard</small>
    </div>
    <div class="topbar-right">
      <span style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;color:#6dbf6a;">● LIVE</span>
      <button class="btn-ghost" onclick="logout()">Sign out</button>
    </div>
  </nav>
  <div class="dash-body">
    <div class="stats-grid">
      <div class="stat"><div class="lbl">Total Submissions</div><div class="val" id="t-total">0</div></div>
      <div class="stat"><div class="lbl">Students</div><div class="val" id="t-students">0</div></div>
      <div class="stat"><div class="lbl">Phases Active</div><div class="val" id="t-phases">0</div></div>
      <div class="stat"><div class="lbl">Classes</div><div class="val" id="t-classes">0</div></div>
    </div>
    <div class="filter-bar">
      <select id="f-phase" onchange="applyFilters()">
        <option value="">All phases</option>
        <option value="1">Phase I — Question &amp; Hypothesis</option>
        <option value="2">Phase II — Experiment &amp; Data</option>
        <option value="3">Phase III — Analysis</option>
        <option value="4">Phase IV — Research Paper</option>
        <option value="5">Phase V — Presentation</option>
      </select>
      <select id="f-class" onchange="applyFilters()">
        <option value="">All classes</option>
        <option>Grade 6A</option><option>Grade 6B</option>
        <option>Grade 7A</option><option>Grade 7B</option>
        <option>Grade 8A</option><option>Grade 8B</option>
      </select>
      <input type="text" id="f-search" placeholder="Search by name…" oninput="applyFilters()" />
    </div>
    <div class="subs-list" id="subs-list"><div class="empty">Loading…</div></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-header">
      <div>
        <div class="modal-phase-tag" id="m-phase-tag"></div>
        <h3 id="m-title"></h3>
        <p id="m-meta"></p>
      </div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div id="m-body"></div>
  </div>
</div>

<script>
const PHASES = [
  {
    num:1, roman:'I', color:'#2c5f8a',
    name:'Question & Hypothesis',
    weeks:'Weeks 1–3 · Due end of Week 3',
    deliverable:'Written Research Question + Hypothesis Statement',
    icon:'🔬',
    fields:[
      {id:'question',   label:'Research Question',    type:'textarea', placeholder:'State your research question clearly and precisely…',   required:true},
      {id:'hypothesis', label:'Hypothesis',            type:'textarea', placeholder:'What do you predict will happen, and why?',             required:true},
      {id:'subject',    label:'Subject / Discipline',  type:'select',
       options:['Biology / Life Sciences','Chemistry','Physics','Environmental Science','Mathematics / Statistics','Computer Science','Social Science / Psychology','Interdisciplinary','Other'],
       required:true}
    ],
    fileLabel:'Upload written hypothesis document (optional)', fileHint:'PDF, DOC, DOCX · Max 10MB', fileAccept:'.pdf,.doc,.docx', fileRequired:false
  },
  {
    num:2, roman:'II', color:'#2d6a4f',
    name:'Experiment & Data',
    weeks:'Weeks 4–6 · Due end of Week 6',
    deliverable:'Experiment Data & Lab Notes',
    icon:'📊',
    fields:[
      {id:'expType',     label:'Experiment Type',         type:'select',
       options:['Controlled Laboratory Experiment','Field Experiment / Observation','Survey / Questionnaire Based','Computational / Simulation','Other'],
       required:true},
      {id:'methodology', label:'Describe Your Methodology', type:'textarea', placeholder:'How did you conduct your experiment? What variables did you use? How did you collect data?', required:true}
    ],
    fileLabel:'Upload data files & lab notes', fileHint:'CSV, Excel, PDF, DOCX, JPG, PNG · Max 20MB', fileAccept:'.csv,.xlsx,.pdf,.doc,.docx,.jpg,.jpeg,.png', fileRequired:true
  },
  {
    num:3, roman:'III', color:'#c47c2a',
    name:'Analysis',
    weeks:'Week 7 · Due end of Week 7',
    deliverable:'Graphs + Written Analysis Document',
    icon:'📈',
    fields:[
      {id:'findings',   label:'Key Findings', type:'textarea', placeholder:'Summarise the key patterns and findings from your data analysis…', required:true},
      {id:'conclusion', label:'Conclusion',   type:'textarea', placeholder:'Does your data support your hypothesis? What conclusions can you draw?', required:true}
    ],
    fileLabel:'Upload graphs & analysis document', fileHint:'PDF, DOCX, JPG, PNG, PPT · Max 20MB', fileAccept:'.pdf,.doc,.docx,.jpg,.jpeg,.png,.ppt,.pptx', fileRequired:true
  },
  {
    num:4, roman:'IV', color:'#8b3a1a',
    name:'Research Paper',
    weeks:'Weeks 8–10 · Due end of Week 10',
    deliverable:'Full Research Paper Draft (PDF or DOCX)',
    icon:'📄',
    fields:[
      {id:'paperTitle', label:'Paper Title', type:'text',     placeholder:'Title of your research paper', required:true},
      {id:'abstract',   label:'Abstract',    type:'textarea', placeholder:'Provide a brief abstract (150–250 words) summarising your research…', required:true}
    ],
    fileLabel:'Upload your research paper', fileHint:'PDF, DOC, DOCX · Max 20MB', fileAccept:'.pdf,.doc,.docx', fileRequired:true
  },
  {
    num:5, roman:'V', color:'#b8860b',
    name:'Presentation',
    weeks:'Weeks 11–12 · Slides due end of Week 11',
    deliverable:'Presentation Slides (PPT or PDF)',
    icon:'🎤',
    fields:[
      {id:'summary', label:'One-Line Research Summary',         type:'text',     placeholder:'Summarise your entire research in one sentence…', required:true},
      {id:'notes',   label:'Presentation Notes (optional)',     type:'textarea', placeholder:'Any notes for the editorial board about your presentation…'}
    ],
    fileLabel:'Upload presentation slides', fileHint:'PPT, PPTX, PDF · Max 30MB', fileAccept:'.ppt,.pptx,.pdf', fileRequired:true
  }
];

const TEACHER_CODE = 'catalyst2025';
const COLLECTION   = 'submissions';

let db, F;
let currentUser  = null;
let currentPhase = 1;
let pendingFile  = null;
let studentSubs  = {};
let allSubs      = [];
let teacherItems = [];
let unsubscribe  = null;

function waitForFirebase() {
  return new Promise(resolve => {
    if (window.__fbReady) { resolve(); return; }
    window.addEventListener('firebase-ready', resolve, {once:true});
  });
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function show(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function showLoading(msg){ document.getElementById('loading-msg').textContent=msg||'Loading…'; document.getElementById('loading-overlay').classList.add('show'); }
function hideLoading(){ document.getElementById('loading-overlay').classList.remove('show'); }
function toast(msg,ms=2800){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),ms); }

function logout(){
  if(unsubscribe){unsubscribe();unsubscribe=null;}
  currentUser=null; pendingFile=null; studentSubs={};
  ['s-name','t-code'].forEach(id=>{ const el=document.getElementById(id); if(el)el.value=''; });
  document.getElementById('s-class').value='';
  show('login-screen');
}

function setRole(role,btn){
  document.querySelectorAll('.role-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('pane-student').style.display=role==='student'?'block':'none';
  document.getElementById('pane-teacher').style.display=role==='teacher'?'block':'none';
}

async function studentLogin(){
  const name=document.getElementById('s-name').value.trim();
  const cls=document.getElementById('s-class').value;
  if(!name){alert('Please enter your name.');return;}
  if(!cls){alert('Please select your class.');return;}
  currentUser={name,class:cls,role:'student'};
  showLoading('Loading your submissions…');
  await waitForFirebase();
  db=window.__db; F=window.__firestore;
  await loadStudentSubs();
  hideLoading();
  const initials=name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('s-avatar').textContent=initials;
  document.getElementById('s-display').textContent=name.split(' ')[0];
  currentPhase=1;
  show('student-screen');
  renderPhaseNav();
  renderPhaseForm();
}

async function teacherLogin(){
  if(document.getElementById('t-code').value!==TEACHER_CODE){alert('Incorrect access code.');return;}
  showLoading('Loading dashboard…');
  await waitForFirebase();
  db=window.__db; F=window.__firestore;
  currentUser={name:'Teacher',role:'teacher'};
  show('teacher-screen');
  subscribeTeacher();
  hideLoading();
}

async function loadStudentSubs(){
  try{
    const snap=await F.getDocs(F.collection(db,COLLECTION));
    studentSubs={};
    snap.forEach(d=>{
      const data=d.data();
      if(data.studentName===currentUser.name&&data.class===currentUser.class)
        studentSubs[data.phase]={...data,id:d.id};
    });
  }catch(e){console.error(e);toast('Could not load — check Firebase config.');}
}

function renderPhaseNav(){
  const nav=document.getElementById('phase-nav');
  nav.innerHTML='';
  PHASES.forEach(p=>{
    const done=!!studentSubs[p.num];
    const btn=document.createElement('button');
    btn.className='phase-pill'+(p.num===currentPhase?' active':'')+(done?' done':'');
    btn.dataset.p=p.num;
    btn.innerHTML=`<span class="pill-roman">${p.roman}</span><span class="pill-name">${p.name}</span><span class="pill-weeks">${p.weeks.split('·')[0].trim()}</span><span class="pill-status">${done?'✓ Submitted':''}</span>`;
    btn.onclick=()=>{currentPhase=p.num;pendingFile=null;renderPhaseNav();renderPhaseForm();};
    nav.appendChild(btn);
  });
}

function renderPhaseForm(){
  const area=document.getElementById('phase-content');
  const p=PHASES[currentPhase-1];
  const sub=studentSubs[currentPhase];

  if(sub&&!sub._editing){
    let fHtml=p.fields.map(f=>{
      const val=sub[f.id]; if(!val)return '';
      return `<div class="sub-field"><div class="sub-field-label">${esc(f.label)}</div><div class="sub-field-value">${esc(val)}</div></div>`;
    }).join('');
    area.innerHTML=`<div class="submitted-view show"><div class="submitted-header"><div class="check-circle">✓</div><div><h3>Phase ${p.roman} submitted</h3><p>Submitted ${esc(sub.dateStr||'')}</p></div></div>${fHtml}${sub.fileName?`<div class="sub-file">📎 ${esc(sub.fileName)}</div>`:''}<button class="btn-edit" onclick="editSub()">Edit submission →</button></div>`;
    return;
  }

  let fieldsHtml=p.fields.map(f=>{
    const val=esc(sub?.[f.id]||'');
    if(f.type==='textarea')
      return `<div class="field"><label>${esc(f.label)}${f.required?' *':''}</label><textarea id="f-${f.id}" placeholder="${esc(f.placeholder||'')}">${val}</textarea></div>`;
    if(f.type==='select'){
      const opts=f.options.map(o=>`<option${val===o?' selected':''}>${esc(o)}</option>`).join('');
      return `<div class="field"><label>${esc(f.label)}${f.required?' *':''}</label><select id="f-${f.id}"><option value="">Select…</option>${opts}</select></div>`;
    }
    return `<div class="field"><label>${esc(f.label)}${f.required?' *':''}</label><input type="text" id="f-${f.id}" placeholder="${esc(f.placeholder||'')}" value="${val}" /></div>`;
  }).join('');

  const existingFile=sub?.fileName||'';
  area.innerHTML=`
    <div class="form-card">
      <div class="form-card-header">
        <div class="phase-badge" style="background:${p.color}">${p.roman}</div>
        <div class="form-card-header-text"><h3>${p.icon} ${esc(p.name)}</h3><span class="weeks-tag">${esc(p.weeks)}</span></div>
      </div>
      <div class="deliverable-bar" style="border-left-color:${p.color}">
        <strong style="color:${p.color}">📋 Deliverable</strong>${esc(p.deliverable)}
      </div>
      <div class="form-body">
        ${fieldsHtml}
        <div class="field">
          <label>${esc(p.fileLabel)}${p.fileRequired?' *':''}</label>
          <div class="file-drop" id="drop-zone" onclick="document.getElementById('f-file').click()">
            <input type="file" id="f-file" accept="${p.fileAccept}" onchange="pickFile(this)" />
            <div class="file-drop-icon">📁</div>
            <p class="file-drop-label">Click to upload or drag & drop</p>
            <p class="file-drop-hint">${esc(p.fileHint)}</p>
          </div>
          <div class="file-chosen ${pendingFile||existingFile?'show':''}" id="file-label">${pendingFile?'📎 '+esc(pendingFile):(existingFile?'📎 '+esc(existingFile):'')}</div>
        </div>
      </div>
      <div class="form-footer">
        <button class="btn-submit" id="f-btn" onclick="submitPhase()">Submit Phase ${p.roman} →</button>
        <p class="submit-note">Syncs instantly to your teacher's dashboard.</p>
      </div>
    </div>`;

  const zone=document.getElementById('drop-zone');
  zone.addEventListener('dragover',e=>{e.preventDefault();zone.style.borderColor=p.color;});
  zone.addEventListener('dragleave',()=>{zone.style.borderColor='';});
  zone.addEventListener('drop',e=>{e.preventDefault();zone.style.borderColor='';const f=e.dataTransfer.files[0];if(f){pendingFile=f.name;showFileLabel(f.name);}});
}

function pickFile(input){if(input.files[0]){pendingFile=input.files[0].name;showFileLabel(pendingFile);}}
function showFileLabel(name){const el=document.getElementById('file-label');if(el){el.textContent='📎 '+name;el.classList.add('show');}}
function editSub(){if(studentSubs[currentPhase])studentSubs[currentPhase]._editing=true;renderPhaseForm();}

async function submitPhase(){
  const p=PHASES[currentPhase-1];
  const data={};
  for(const f of p.fields){
    const el=document.getElementById('f-'+f.id);
    if(!el)continue;
    data[f.id]=el.value.trim();
    if(f.required&&!data[f.id]){alert(`Please fill in: ${f.label}`);return;}
  }
  const prev=studentSubs[currentPhase]||{};
  const fileName=pendingFile||prev.fileName||null;
  if(p.fileRequired&&!fileName){alert('Please attach your file for this phase.');return;}

  const btn=document.getElementById('f-btn');
  btn.disabled=true;btn.textContent='Saving…';

  const docId=`${currentUser.name}__${currentUser.class}__phase${currentPhase}`.replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_\-]/g,'');
  const dateStr=new Date().toLocaleString('en-IN',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
  const payload={studentName:currentUser.name,class:currentUser.class,phase:currentPhase,phaseName:p.name,...data,fileName,dateStr,updatedAt:F.serverTimestamp()};

  try{
    await F.setDoc(F.doc(db,COLLECTION,docId),payload);
    studentSubs[currentPhase]={...payload,id:docId};
    pendingFile=null;
    toast(`Phase ${p.roman} submitted ✓`);
    renderPhaseNav();renderPhaseForm();
  }catch(e){
    console.error(e);btn.disabled=false;btn.textContent=`Submit Phase ${p.roman} →`;
    toast('Error saving. Check your connection.');
  }
}

function subscribeTeacher(){
  if(unsubscribe)unsubscribe();
  const q=F.query(F.collection(db,COLLECTION),F.orderBy('updatedAt','desc'));
  unsubscribe=F.onSnapshot(q,snap=>{
    allSubs=[];snap.forEach(d=>allSubs.push({id:d.id,...d.data()}));
    updateStats();applyFilters();
  },err=>{console.error(err);document.getElementById('subs-list').innerHTML='<div class="empty">Could not load. Check Firestore rules.</div>';});
}

function updateStats(){
  const students=new Set(allSubs.map(s=>s.studentName+'__'+s.class));
  const phases=new Set(allSubs.map(s=>s.phase));
  const classes=new Set(allSubs.map(s=>s.class));
  document.getElementById('t-total').textContent=allSubs.length;
  document.getElementById('t-students').textContent=students.size;
  document.getElementById('t-phases').textContent=phases.size;
  document.getElementById('t-classes').textContent=classes.size;
}

function applyFilters(){
  const pf=document.getElementById('f-phase').value;
  const cf=document.getElementById('f-class').value;
  const sf=document.getElementById('f-search').value.toLowerCase();
  teacherItems=allSubs.filter(s=>{
    if(pf&&String(s.phase)!==pf)return false;
    if(cf&&s.class!==cf)return false;
    if(sf&&!(s.studentName||'').toLowerCase().includes(sf))return false;
    return true;
  });
  const list=document.getElementById('subs-list');
  if(!teacherItems.length){list.innerHTML='<div class="empty">No submissions found.</div>';return;}
  list.innerHTML=teacherItems.map((it,i)=>{
    const ph=PHASES[(it.phase||1)-1];
    const firstField=ph?.fields?.[0]?.id;
    const preview=firstField?it[firstField]:it.text||'(no text)';
    return `<div class="sub-row" data-p="${it.phase||1}" onclick="openModal(${i})">
      <div class="sub-row-top"><span class="sub-row-name">${esc(it.studentName||'Unknown')}</span><span class="sub-row-phase">Phase ${ph?.roman||it.phase} · ${esc(it.class||'')}</span></div>
      <div class="sub-row-preview">${esc(preview)}</div>
      <div class="sub-row-tags"><span class="tag tag-text">${esc(ph?.name||'')}</span>${it.fileName?'<span class="tag tag-file">📎 File</span>':''}<span class="sub-ts">${esc(it.dateStr||'')}</span></div>
    </div>`;
  }).join('');
}

function openModal(i){
  const it=teacherItems[i];
  const ph=PHASES[(it.phase||1)-1];
  document.getElementById('m-phase-tag').textContent=`Phase ${ph.roman} — ${ph.name}`;
  document.getElementById('m-phase-tag').style.background=ph.color;
  document.getElementById('m-title').textContent=it.studentName||'Unknown';
  document.getElementById('m-meta').textContent=(it.class||'')+(it.dateStr?' · '+it.dateStr:'');
  let bodyHtml=ph.fields.map(f=>{const val=it[f.id];if(!val)return '';return `<div class="modal-section"><div class="modal-section-label">${esc(f.label)}</div><div class="modal-section-value">${esc(val)}</div></div>`;}).join('');
  if(it.fileName)bodyHtml+=`<div class="modal-file">📎 Attached: ${esc(it.fileName)}</div>`;
  document.getElementById('m-body').innerHTML=bodyHtml;
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
</script>
</body>
</html>
