<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Catalyst — NPS Koramangala | Student Portal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display&display=swap" rel="stylesheet" />

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, getDocs, query, orderBy, onSnapshot, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "AIzaSyAlJ-_DTU0SuDEkqDTrrdyGGMM4teBoXR0",
  authDomain:        "catalyst-npskrm.firebaseapp.com",
  projectId:         "catalyst-npskrm",
  storageBucket:     "catalyst-npskrm.firebasestorage.app",
  messagingSenderId: "27518394660",
  appId:             "1:27518394660:web:3a3ac9b8f8e58bcdff13b1"
};

const app  = initializeApp(firebaseConfig);
const db   = getFirestore(app);

window.__db = db;
window.__fbReady = true;
window.__firestore = { collection, doc, setDoc, getDocs, query, orderBy, onSnapshot, serverTimestamp };
window.dispatchEvent(new Event('firebase-ready'));
</script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #f7f6f2;
  --surface:    #ffffff;
  --surface2:   #f0efe9;
  --border:     rgba(0,0,0,0.10);
  --border2:    rgba(0,0,0,0.18);
  --text:       #1a1916;
  --text2:      #6b6a65;
  --text3:      #a09f9a;
  --accent:     #1a1916;
  --accent-fg:  #ffffff;
  --info-bg:    #eaf1fb;
  --info-fg:    #1a5fa8;
  --success-bg: #eaf4e8;
  --success-fg: #2a7a28;
  --warn-bg:    #fef8ec;
  --warn-fg:    #92620a;
  --radius:     10px;
  --radius-lg:  14px;
}

body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; font-size:15px; line-height:1.6; }

.screen { display:none; }
.screen.active { display:block; }
#login-screen.active { display:flex; }

/* ── TOPBAR ── */
.topbar {
  background:var(--surface); border-bottom:0.5px solid var(--border);
  padding:0 1.5rem; height:52px; display:flex; align-items:center;
  justify-content:space-between; position:sticky; top:0; z-index:10;
}
.topbar-brand { display:flex; align-items:center; gap:10px; }
.topbar-brand .logo {
  width:28px; height:28px; border-radius:7px; background:var(--text);
  display:flex; align-items:center; justify-content:center;
}
.topbar-brand .logo svg { width:15px; height:15px; color:#fff; }
.topbar-brand span { font-size:14px; font-weight:500; }
.topbar-brand small { font-size:12px; color:var(--text2); margin-left:4px; }
.topbar-right { display:flex; align-items:center; gap:10px; }
.avatar {
  width:30px; height:30px; border-radius:50%;
  background:var(--info-bg); color:var(--info-fg);
  font-size:11px; font-weight:500; display:flex; align-items:center; justify-content:center;
}
.user-name { font-size:13px; font-weight:500; }
.btn-ghost {
  font-size:12px; padding:5px 12px; border:0.5px solid var(--border2);
  border-radius:8px; background:transparent; cursor:pointer; color:var(--text2); font-family:inherit;
}
.btn-ghost:hover { background:var(--surface2); }

/* ── LOGIN ── */
#login-screen {
  flex-direction:column; align-items:center; justify-content:center;
  min-height:100vh; padding:2rem 1rem; background:var(--bg);
}
.login-wrap { width:100%; max-width:380px; }
.login-hero { text-align:center; margin-bottom:2rem; }
.login-hero .icon-wrap {
  width:56px; height:56px; border-radius:14px; background:var(--text);
  margin:0 auto 14px; display:flex; align-items:center; justify-content:center;
}
.login-hero .icon-wrap svg { width:26px; height:26px; color:#fff; }
.login-hero h1 { font-family:'DM Serif Display',serif; font-size:24px; font-weight:400; }
.login-hero p  { font-size:13px; color:var(--text2); margin-top:4px; }

.role-tabs {
  display:flex; gap:6px; background:var(--surface2);
  border-radius:10px; padding:4px; margin-bottom:1.25rem;
}
.role-tab {
  flex:1; padding:7px 0; font-size:13px; font-weight:500;
  border:none; background:transparent; color:var(--text2);
  border-radius:7px; cursor:pointer; font-family:inherit; transition:all .15s;
}
.role-tab.active {
  background:var(--surface); color:var(--text);
  box-shadow:0 1px 3px rgba(0,0,0,.08);
}

.card { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius-lg); padding:1.5rem; }

.field { margin-bottom:12px; }
.field label { display:block; font-size:12px; font-weight:500; color:var(--text2); margin-bottom:5px; }
.field input, .field select {
  width:100%; padding:9px 12px; font-size:14px; font-family:inherit;
  border:0.5px solid var(--border2); border-radius:var(--radius);
  background:var(--surface); color:var(--text); outline:none; transition:border-color .15s;
}
.field input:focus, .field select:focus { border-color:var(--text); }

.hint { font-size:12px; color:var(--text3); margin-bottom:12px; }
.hint strong { color:var(--text2); font-weight:500; }

.btn-primary {
  width:100%; padding:10px; background:var(--accent); color:var(--accent-fg);
  border:none; border-radius:var(--radius); font-size:14px; font-weight:500;
  cursor:pointer; font-family:inherit; margin-top:4px; transition:opacity .15s;
}
.btn-primary:hover { opacity:.85; }
.btn-primary:disabled { opacity:.4; cursor:not-allowed; }

/* ── STUDENT PORTAL ── */
.portal-body { max-width:700px; margin:0 auto; padding:1.5rem 1rem; }

.week-nav { display:flex; gap:6px; overflow-x:auto; padding-bottom:4px; margin-bottom:1.5rem; scrollbar-width:none; }
.week-nav::-webkit-scrollbar { display:none; }
.week-pill {
  flex-shrink:0; padding:5px 14px; font-size:13px; font-weight:500;
  border:0.5px solid var(--border2); border-radius:20px; background:transparent;
  cursor:pointer; color:var(--text2); font-family:inherit; transition:all .15s; white-space:nowrap;
}
.week-pill:hover { background:var(--surface2); }
.week-pill.active { background:var(--text); color:#fff; border-color:var(--text); }
.week-pill.done { border-color:#6dbf6a; color:var(--success-fg); background:#f0faf0; }
.week-pill.active.done { background:var(--success-fg); color:#fff; border-color:var(--success-fg); }

.form-card { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius-lg); padding:1.5rem; }
.form-card h2 { font-size:16px; font-weight:500; margin-bottom:4px; }
.form-card .sub { font-size:13px; color:var(--text2); margin-bottom:1.25rem; }
.section-label { font-size:12px; font-weight:500; color:var(--text2); margin:1rem 0 6px; }

textarea {
  width:100%; min-height:130px; resize:vertical; padding:10px 12px;
  font-size:14px; font-family:inherit; border:0.5px solid var(--border2);
  border-radius:var(--radius); background:var(--surface2); color:var(--text);
  outline:none; line-height:1.6; transition:all .15s;
}
textarea:focus { background:var(--surface); border-color:var(--text); }

.file-drop {
  border:0.5px dashed var(--border2); border-radius:var(--radius);
  padding:1.25rem; text-align:center; cursor:pointer;
  background:var(--surface2); transition:background .15s;
}
.file-drop:hover { background:#eeeee8; }
.file-drop p { font-size:13px; color:var(--text2); line-height:1.8; }
.file-drop p span { color:var(--info-fg); font-weight:500; }
.file-chosen { font-size:13px; color:var(--success-fg); margin-top:6px; display:none; }
.file-chosen.show { display:block; }

.form-actions { display:flex; align-items:center; gap:12px; margin-top:1.25rem; }
.btn-submit {
  padding:9px 22px; background:var(--accent); color:var(--accent-fg);
  border:none; border-radius:var(--radius); font-size:14px; font-weight:500;
  cursor:pointer; font-family:inherit; transition:opacity .15s;
}
.btn-submit:hover { opacity:.85; }
.btn-submit:disabled { opacity:.4; cursor:not-allowed; }
.save-msg { font-size:13px; color:var(--success-fg); display:none; }
.save-msg.show { display:block; }

.submitted-banner {
  background:var(--success-bg); border:0.5px solid #b2deb0;
  border-radius:var(--radius-lg); padding:1.25rem; display:none;
}
.submitted-banner.show { display:block; }
.submitted-banner h3 { font-size:14px; font-weight:500; color:var(--success-fg); margin-bottom:6px; }
.submitted-banner .entry-text { font-size:13px; color:var(--text2); line-height:1.7; white-space:pre-wrap; }
.submitted-banner .file-ref { font-size:13px; color:var(--info-fg); margin-top:6px; }
.submitted-banner .ts { font-size:12px; color:var(--text3); margin-top:6px; }
.btn-edit { font-size:13px; color:var(--info-fg); background:none; border:none; cursor:pointer; padding:0; margin-top:8px; font-family:inherit; }

/* ── TEACHER DASHBOARD ── */
.dash-body { max-width:800px; margin:0 auto; padding:1.5rem 1rem; }

.stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:1.5rem; }
.stat { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius); padding:14px 16px; }
.stat .lbl { font-size:12px; color:var(--text2); margin-bottom:4px; }
.stat .val { font-size:26px; font-weight:500; }

.filter-bar { display:flex; gap:8px; margin-bottom:1rem; flex-wrap:wrap; }
.filter-bar select, .filter-bar input {
  padding:8px 10px; font-size:13px; font-family:inherit;
  border:0.5px solid var(--border2); border-radius:var(--radius);
  background:var(--surface); color:var(--text); outline:none;
}
.filter-bar select { min-width:130px; }
.filter-bar input { flex:1; min-width:160px; }

.subs-list { display:flex; flex-direction:column; gap:8px; }
.sub-row {
  background:var(--surface); border:0.5px solid var(--border);
  border-radius:var(--radius-lg); padding:1rem 1.25rem; cursor:pointer; transition:border-color .15s;
}
.sub-row:hover { border-color:var(--border2); }
.sub-row-top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:4px; }
.sub-row-name { font-size:14px; font-weight:500; }
.sub-row-week { font-size:12px; color:var(--text2); white-space:nowrap; }
.sub-row-preview { font-size:13px; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sub-row-tags { display:flex; gap:6px; margin-top:6px; align-items:center; }
.tag { font-size:11px; padding:2px 8px; border-radius:10px; font-weight:500; }
.tag-journal { background:var(--surface2); color:var(--text2); }
.tag-file    { background:var(--info-bg);  color:var(--info-fg); }
.sub-ts { font-size:11px; color:var(--text3); margin-left:auto; }

.empty { text-align:center; padding:2.5rem; font-size:14px; color:var(--text3); }

/* ── TOAST ── */
.toast {
  position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%) translateY(80px);
  background:var(--text); color:#fff; padding:10px 20px; border-radius:var(--radius);
  font-size:13px; font-weight:500; z-index:999; transition:transform .3s ease;
  white-space:nowrap; pointer-events:none;
}
.toast.show { transform:translateX(-50%) translateY(0); }

/* ── MODAL ── */
.modal-backdrop {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.4); z-index:100;
  align-items:center; justify-content:center; padding:1rem;
}
.modal-backdrop.open { display:flex; }
.modal-box {
  background:var(--surface); border-radius:var(--radius-lg);
  padding:1.5rem; width:100%; max-width:520px; max-height:85vh; overflow-y:auto;
  border:0.5px solid var(--border);
}
.modal-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:1rem; }
.modal-header h3 { font-size:15px; font-weight:500; }
.modal-header p  { font-size:13px; color:var(--text2); margin-top:2px; }
.modal-close { background:none; border:none; font-size:20px; cursor:pointer; color:var(--text2); line-height:1; flex-shrink:0; }
.modal-content { font-size:14px; color:var(--text); line-height:1.75; white-space:pre-wrap; }
.modal-file { font-size:13px; color:var(--info-fg); margin-top:10px; }

/* ── LOADING ── */
.loading-overlay {
  display:none; position:fixed; inset:0; background:var(--bg);
  z-index:200; align-items:center; justify-content:center; flex-direction:column; gap:12px;
}
.loading-overlay.show { display:flex; }
.spinner {
  width:28px; height:28px; border:2.5px solid var(--border2);
  border-top-color:var(--text); border-radius:50%; animation:spin .7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.loading-overlay p { font-size:13px; color:var(--text2); }

@media(max-width:500px) {
  .stats-grid { grid-template-columns:repeat(2,1fr); }
  .topbar-brand small { display:none; }
}
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
  <p id="loading-msg">Connecting…</p>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ═══════════ LOGIN ═══════════ -->
<div id="login-screen" class="screen active">
  <div class="login-wrap">
    <div class="login-hero">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <h1>Catalyst</h1>
      <p>NPS Koramangala · Young Investigators Journal</p>
    </div>

    <div class="role-tabs">
      <button class="role-tab active" onclick="setRole('student',this)">Student</button>
      <button class="role-tab" onclick="setRole('teacher',this)">Teacher</button>

    <div class="card">
      <!-- Student -->
      <div id="pane-student">

        </div>
        <div class="field">

          <select id="s-class">

            <option>Grade 6A</option><option>Grade 6B</option>

          </select>

      </div>
      <!-- Teacher -->
      <div id="pane-teacher" style="display:none">

        </div>

        <button class="btn-primary" onclick="teacherLogin()">Sign in as teacher →</button>
      </div>

</div>

<!-- ═══════════ STUDENT PORTAL ═══════════ -->
<div id="student-screen" class="screen">
  <nav class="topbar">
    <div class="topbar-brand">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <span>Catalyst</span><small>NPS Koramangala</small>
    </div>
    <div class="topbar-right">
      <div class="avatar" id="s-avatar">RS</div>
      <span class="user-name" id="s-display"></span>
      <button class="btn-ghost" onclick="logout()">Sign out</button>

  </nav>
  <div class="portal-body">
    <div class="week-nav" id="week-nav"></div>
    <div id="week-content"></div>
  </div>
</div>

<!-- ═══════════ TEACHER DASHBOARD ═══════════ -->
<div id="teacher-screen" class="screen">
  <nav class="topbar">
    <div class="topbar-brand">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <span>Catalyst</span><small>Teacher Dashboard</small>
    </div>
    <div class="topbar-right">
      <span style="font-size:12px;color:var(--success-fg);background:var(--success-bg);padding:4px 10px;border-radius:20px;">● Live</span>
      <button class="btn-ghost" onclick="logout()">Sign out</button>
    </div>
  </nav>
  <div class="dash-body">
    <div class="stats-grid">
      <div class="stat"><div class="lbl">Total submissions</div><div class="val" id="t-total">0</div></div>
      <div class="stat"><div class="lbl">Students</div><div class="val" id="t-students">0</div></div>
      <div class="stat"><div class="lbl">Weeks active</div><div class="val" id="t-weeks">0</div></div>
    </div>
    <div class="filter-bar">
      <select id="f-week" onchange="applyFilters()">
        <option value="">All weeks</option>
      </select>
      <select id="f-class" onchange="applyFilters()">
        <option value="">All classes</option>
        <option>Grade 6A</option><option>Grade 6B</option>
        <option>Grade 7A</option><option>Grade 7B</option>
        <option>Grade 8A</option><option>Grade 8B</option>
      </select>
      <input type="text" id="f-search" placeholder="Search by name…" oninput="applyFilters()" />

<!-- MODAL -->
<div class="modal-backdrop" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-header">
      <div><h3 id="m-title"></h3><p id="m-meta"></p></div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-content" id="m-body"></div>
    <div class="modal-file"    id="m-file"></div>
  </div>
</div>

<script>
/* ════════════════════════════════════════
   CONFIG
════════════════════════════════════════ */
const WEEKS        = 8;
const TEACHER_CODE = 'catalyst2025';   // ← change this to your own secret code
const COLLECTION   = 'submissions';    // Firestore collection name

/* ════════════════════════════════════════
   STATE
════════════════════════════════════════ */
let db, F;               // Firestore instance + helpers
let currentUser  = null;
let currentWeek  = 1;
let pendingFile  = null;
let allSubs      = [];   // teacher: live array from Firestore
let teacherItems = [];   // filtered view
let unsubscribe  = null; // live listener cleanup

/* ════════════════════════════════════════
   WAIT FOR FIREBASE
════════════════════════════════════════ */
function waitForFirebase() {
  return new Promise(resolve => {
    if (window.__fbReady) { resolve(); return; }
    window.addEventListener('firebase-ready', resolve, { once: true });
  });
}

/* ════════════════════════════════════════
   HELPERS
════════════════════════════════════════ */
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showLoading(msg) {
  document.getElementById('loading-msg').textContent = msg || 'Loading…';
  document.getElementById('loading-overlay').classList.add('show');
}
function hideLoading() {
  document.getElementById('loading-overlay').classList.remove('show');
}
function toast(msg, duration=2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}
function logout() {
  if (unsubscribe) { unsubscribe(); unsubscribe = null; }
  currentUser = null; pendingFile = null;
  document.getElementById('s-name').value  = '';
  document.getElementById('s-class').value = '';
  document.getElementById('t-code').value  = '';
  show('login-screen');
}

/* ════════════════════════════════════════
   ROLE TABS
════════════════════════════════════════ */
function setRole(role, btn) {
  document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('pane-student').style.display = role==='student' ? 'block' : 'none';
  document.getElementById('pane-teacher').style.display = role==='teacher' ? 'block' : 'none';
}

/* ════════════════════════════════════════
   STUDENT LOGIN
════════════════════════════════════════ */
async function studentLogin() {
  const name = document.getElementById('s-name').value.trim();
  const cls  = document.getElementById('s-class').value;
  if (!name) { alert('Please enter your name.'); return; }
  if (!cls)  { alert('Please select your class.'); return; }
  currentUser = { name, class: cls, role:'student' };

  showLoading('Signing in…');
  await waitForFirebase();
  db = window.__db;
  F  = window.__firestore;
  hideLoading();

  const initials = name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('s-avatar').textContent  = initials;
  document.getElementById('s-display').textContent = name.split(' ')[0];
  currentWeek = 1;
  show('student-screen');
  await loadStudentSubs();
}

/* ════════════════════════════════════════
   TEACHER LOGIN
════════════════════════════════════════ */
async function teacherLogin() {
  if (document.getElementById('t-code').value !== TEACHER_CODE) {
    alert('Incorrect access code.'); return;
  }
  showLoading('Loading dashboard…');
  await waitForFirebase();
  db = window.__db;
  F  = window.__firestore;
  currentUser = { name:'Teacher', role:'teacher' };
  buildWeekFilter();
  show('teacher-screen');
  subscribeTeacher();
  hideLoading();
}

/* ════════════════════════════════════════
   STUDENT — load own submissions
════════════════════════════════════════ */
let studentSubs = {};  // weekKey → sub data

async function loadStudentSubs() {
  showLoading('Loading your submissions…');
  try {
    const snap = await F.getDocs(
      F.query(F.collection(db, COLLECTION))
    );
    studentSubs = {};
    snap.forEach(d => {
      const data = d.data();
      if (data.studentName === currentUser.name && data.class === currentUser.class) {
        studentSubs['week' + data.week] = { ...data, id: d.id };
      }
    });
  } catch(e) {
    console.error(e);
    toast('Could not load submissions — check Firebase config.');
  }
  hideLoading();
  renderWeekNav();
  renderWeekForm();
}

/* ════════════════════════════════════════
   STUDENT — week nav
════════════════════════════════════════ */
function renderWeekNav() {
  const nav = document.getElementById('week-nav');
  nav.innerHTML = '';
  for (let w=1; w<=WEEKS; w++) {
    const done = !!studentSubs['week'+w];
    const btn  = document.createElement('button');
    btn.className = 'week-pill' + (w===currentWeek?' active':'') + (done?' done':'');
    btn.textContent = 'Week ' + w;
    const ww = w;
    btn.onclick = () => { currentWeek=ww; pendingFile=null; renderWeekNav(); renderWeekForm(); };
    nav.appendChild(btn);
  }
}

/* ════════════════════════════════════════
   STUDENT — submission form / view
════════════════════════════════════════ */
function renderWeekForm() {
  const area     = document.getElementById('week-content');
  const existing = studentSubs['week'+currentWeek];

  if (existing && !existing._editing) {
    area.innerHTML = `
      <div class="submitted-banner show">
        <h3>✓ Week ${currentWeek} submitted</h3>
        <div class="entry-text">${esc(existing.text||'(no text entry)')}</div>
        ${existing.fileName ? `<div class="file-ref">📎 ${esc(existing.fileName)}</div>` : ''}
        <div class="ts">Submitted ${esc(existing.dateStr||'')}</div>
        <button class="btn-edit" onclick="editSub()">Edit submission</button>
      </div>`;
    return;
  }

  area.innerHTML = `
    <div class="form-card">
      <h2>Week ${currentWeek} — Research Journal</h2>
      <div class="sub">Submit your deliverable for this week, ${esc(currentUser.class)}.</div>

      <div class="section-label">Journal entry / writeup</div>
      <textarea id="f-text" placeholder="Describe your investigation: what you explored, what you found, and any new questions…">${existing ? esc(existing.text||'') : ''}</textarea>

      <div class="section-label">Attach a file <span style="font-weight:400;color:var(--text3)">(PDF, image, Word — optional)</span></div>
      <div class="file-drop" id="drop-zone" onclick="document.getElementById('f-file').click()">
        <p><span>Click to upload</span> or drag & drop here</p>
        <p style="font-size:12px;color:var(--text3);margin-top:2px;">Up to 10 MB · PDF, DOC, JPG, PNG</p>
      </div>
      <input type="file" id="f-file" style="display:none;" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png,.gif" onchange="pickFile(this)" />
      <div class="file-chosen ${pendingFile||(existing?.fileName)?'show':''}" id="file-label">
        ${pendingFile ? '📎 '+esc(pendingFile) : (existing?.fileName ? '📎 '+esc(existing.fileName) : '')}
      </div>

      <div class="form-actions">
        <button class="btn-submit" id="f-btn" onclick="submitWeek()">Submit</button>
        <div class="save-msg" id="f-msg"></div>
      </div>
    </div>`;

  const zone = document.getElementById('drop-zone');
  zone.addEventListener('dragover',  e => { e.preventDefault(); zone.style.background='#eeeee8'; });
  zone.addEventListener('dragleave', () => { zone.style.background=''; });
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.style.background='';
    const f = e.dataTransfer.files[0];
    if (f) { pendingFile=f.name; showFileLabel(f.name); }
  });
}

function pickFile(input) {
  if (input.files[0]) { pendingFile=input.files[0].name; showFileLabel(pendingFile); }
}
function showFileLabel(name) {
  const el = document.getElementById('file-label');
  if (el) { el.textContent='📎 '+name; el.classList.add('show'); }
}
function editSub() {
  if (studentSubs['week'+currentWeek]) studentSubs['week'+currentWeek]._editing = true;
  renderWeekForm();
}

/* ════════════════════════════════════════
   STUDENT — submit to Firestore
════════════════════════════════════════ */
async function submitWeek() {
  const text = (document.getElementById('f-text').value||'').trim();
  if (!text && !pendingFile) { alert('Please write a journal entry or attach a file.'); return; }

  const btn = document.getElementById('f-btn');
  const msg = document.getElementById('f-msg');
  btn.disabled = true; btn.textContent = 'Saving…';

  const docId  = `${currentUser.name}__${currentUser.class}__week${currentWeek}`
                  .replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_\-]/g,'');
  const prev   = studentSubs['week'+currentWeek] || {};
  const dateStr = new Date().toLocaleString('en-IN', {
    day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'
  });

  const payload = {
    studentName: currentUser.name,
    class:       currentUser.class,
    week:        currentWeek,
    text,
    fileName:    pendingFile || prev.fileName || null,
    dateStr,
    updatedAt:   F.serverTimestamp()
  };

  try {
    await F.setDoc(F.doc(db, COLLECTION, docId), payload);
    studentSubs['week'+currentWeek] = { ...payload, id:docId };
    pendingFile = null;
    toast('Submitted! ✓');
    renderWeekNav();
    renderWeekForm();
  } catch(e) {
    console.error(e);
    btn.disabled=false; btn.textContent='Submit';
    if (msg) { msg.textContent='Error saving — check connection.'; msg.style.color='var(--warn-fg)'; msg.classList.add('show'); }
  }
}

/* ════════════════════════════════════════
   TEACHER — live listener
════════════════════════════════════════ */
function subscribeTeacher() {
  if (unsubscribe) unsubscribe();
  const q = F.query(F.collection(db, COLLECTION), F.orderBy('updatedAt','desc'));
  unsubscribe = F.onSnapshot(q, snap => {
    allSubs = [];
    snap.forEach(d => allSubs.push({ id:d.id, ...d.data() }));
    updateStats();
    applyFilters();
  }, err => {
    console.error(err);
    document.getElementById('subs-list').innerHTML =
      '<div class="empty">Could not load submissions.<br>Check Firestore rules and config.</div>';
  });
}

function updateStats() {
  const students = new Set(allSubs.map(s => s.studentName+'__'+s.class));
  const weeks    = new Set(allSubs.map(s => s.week));
  document.getElementById('t-total').textContent    = allSubs.length;
  document.getElementById('t-students').textContent = students.size;
  document.getElementById('t-weeks').textContent    = weeks.size;
}

function buildWeekFilter() {
  const sel = document.getElementById('f-week');
  sel.innerHTML = '<option value="">All weeks</option>';
  for (let w=1; w<=WEEKS; w++) sel.innerHTML += `<option value="${w}">Week ${w}</option>`;
}

function applyFilters() {
  const wf = document.getElementById('f-week').value;
  const cf = document.getElementById('f-class').value;
  const sf = document.getElementById('f-search').value.toLowerCase();

  teacherItems = allSubs.filter(s => {
    if (wf && String(s.week) !== wf) return false;
    if (cf && s.class !== cf) return false;
    if (sf && !(s.studentName||'').toLowerCase().includes(sf)) return false;
    return true;
  });

  const list = document.getElementById('subs-list');
  if (!teacherItems.length) {
    list.innerHTML = '<div class="empty">No submissions found.</div>';
    return;
  }

  list.innerHTML = teacherItems.map((it,i) => `
    <div class="sub-row" onclick="openModal(${i})">
      <div class="sub-row-top">
        <span class="sub-row-name">${esc(it.studentName||'Unknown')}</span>
        <span class="sub-row-week">Week ${esc(it.week)} · ${esc(it.class||'')}</span>
      </div>
      <div class="sub-row-preview">${esc(it.text||'(no text)')}</div>
      <div class="sub-row-tags">
        ${it.text     ? '<span class="tag tag-journal">Journal</span>' : ''}
        ${it.fileName ? '<span class="tag tag-file">File attached</span>' : ''}
        <span class="sub-ts">${esc(it.dateStr||'')}</span>
      </div>
    </div>`).join('');
}

function openModal(i) {
  const it = teacherItems[i];
  document.getElementById('m-title').textContent = (it.studentName||'Unknown') + ' — Week ' + it.week;
  document.getElementById('m-meta').textContent  = (it.class||'') + (it.dateStr ? ' · '+it.dateStr : '');
  document.getElementById('m-body').textContent  = it.text || '(No journal text submitted.)';
  document.getElementById('m-file').textContent  = it.fileName ? '📎 Attached: '+it.fileName : '';
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
</script>
</body>
